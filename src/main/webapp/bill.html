<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ocean View Resort | Generate Invoice</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="login-container">
    <div class="login-card wide">
        <h2>💳 Ocean View Resort</h2>
        <p class="subtitle">Generate & Print Invoice</p>

        <div class="input-group">
            <input type="text" id="resNo" required>
            <label>Reservation Number</label>
        </div>

        <button onclick="generateInvoice()">Generate Invoice</button>

        <a href="dashboard.html">
            <button class="secondary">Back</button>
        </a>
    </div>
</div>

<script>
function generateInvoice() {
    let resNo = document.getElementById("resNo").value;

    if (resNo === "") {
        alert("Please enter Reservation Number");
        return;
    }

    window.location.href = "invoice/" + resNo;
}
</script>

</body>
</html>
